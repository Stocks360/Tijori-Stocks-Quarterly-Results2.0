name: Tijori Quarterly Results Bot

on:
  schedule:
    - cron: '30 2 * * *'     # Runs at 7:30 AM IST daily
    - cron: '30 14 * * *'    # Runs at 7:30 PM IST daily
  workflow_dispatch:         # Allows manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Tijori Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          WATCHLIST:          ${{ secrets.WATCHLIST }}
        run: python tijori_scraper.py

      - name: Commit updated known results (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tijori_known.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update known quarterly results [skip ci]"
            git push
          fi
